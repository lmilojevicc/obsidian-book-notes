name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Typecheck
        run: npx tsc -noEmit -skipLibCheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: test -f main.js
